name: Run Get STU from API Script

on:
  schedule:
    - cron: '30 0 * * *'  # 08:30 WITA
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Run script
        run: |
          echo "=== START ==="
          python script.py
          echo "=== END ==="
